name: Shellcheck

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        run: find . -name '*.sh' -print0 | xargs -0 shellcheck --shell=bash -e SC1090 -e SC1091
